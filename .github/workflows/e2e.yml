name: E2E Compose

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: '0 14 * * 1'  # Mondays 14:00 UTC — enable once self-hosted runner is available

jobs:
  e2e:
    # Requires a self-hosted macOS 26+ runner with Apple Container CLI and gocker installed.
    runs-on: [self-hosted, macos-26, apple-container]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build gocker
        run: make build

      - name: Provision VM
        run: ./gocker setup --yes

      - name: Run E2E
        env:
          GOCKER: ${{ github.workspace }}/gocker
        run: make e2e
