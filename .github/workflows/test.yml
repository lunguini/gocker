name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7

  compat-audit:
    name: Docker-compat matrix drift
    runs-on: ubuntu-latest
    # Drift is informational, not a gate — we're intentionally not 100%
    # Docker compatible. The check runs, prints any diff, but never fails
    # the build. Look at the job logs if you want to know what's drifted.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build gocker
        run: make build
      - name: Regenerate matrix
        env:
          GOCKER: ${{ github.workspace }}/gocker
        run: ./test/compat/audit.sh
      - name: Show drift (informational only)
        run: |
          if git diff --exit-code docs/docker-compatibility-matrix.md; then
            echo "Matrix is up to date."
          else
            echo
            echo "::warning title=Compat matrix drift::docs/docker-compatibility-matrix.md is out of date. Run 'make compat-audit' locally and commit the result to refresh."
          fi

  integration-macos:
    name: Integration (macOS)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Apple Container CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the most recent release that has a signed installer pkg
          # (some releases like v0.11.0 have no binary assets)
          ASSET_URL=$(gh api repos/apple/container/releases --paginate \
            --jq '.[].assets[] | select(.name | endswith("installer-signed.pkg")) | .browser_download_url' \
            | head -1)
          if [ -z "$ASSET_URL" ]; then
            echo "No installer-signed.pkg found in any release"
            exit 1
          fi
          echo "Downloading: $ASSET_URL"
          curl -sSL -o /tmp/container.pkg "$ASSET_URL"
          sudo installer -pkg /tmp/container.pkg -target /
      - name: Start container system
        run: yes | container system start
      - name: Pull test images
        run: |
          container image pull alpine:latest
          container image pull docker.io/adyjay/gocker:base-latest
      - name: Run integration tests
        run: go test -tags integration -timeout 5m -v ./...

  smoke-linux:
    name: Smoke (Linux)
    # End-to-end CLI smoke test on the nerdctl backend. GitHub's macOS
    # runners lack Virtualization.framework, so Linux is the only hosted
    # runner where `gocker run` actually works end to end. Compose is
    # skipped by smoke.sh on Linux (it proxies into an Apple container VM).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install containerd + nerdctl + CNI
        env:
          # Anonymous api.github.com calls share a rate limit across all
          # tenants on a runner's IP — unauthenticated lookups intermittently
          # return an error body that jq turns into "null", and tar then
          # chokes on the HTML 404 that follows ("not in gzip format").
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # containerd
          sudo apt-get update && sudo apt-get install -y containerd
          sudo systemctl start containerd

          # nerdctl
          NERDCTL_VERSION=$(gh api repos/containerd/nerdctl/releases/latest --jq .tag_name)
          curl -sSL --fail "https://github.com/containerd/nerdctl/releases/download/${NERDCTL_VERSION}/nerdctl-${NERDCTL_VERSION#v}-linux-amd64.tar.gz" | sudo tar -xzf - -C /usr/local/bin

          # CNI plugins
          CNI_VERSION=$(gh api repos/containernetworking/plugins/releases/latest --jq .tag_name)
          sudo mkdir -p /opt/cni/bin
          curl -sSL --fail "https://github.com/containernetworking/plugins/releases/download/${CNI_VERSION}/cni-plugins-linux-amd64-${CNI_VERSION}.tgz" | sudo tar -xzf - -C /opt/cni/bin
      - name: Build gocker
        run: make build
      - name: Run smoke test
        # nerdctl needs root; sudo passes GOCKER_BIN through as an env assignment.
        run: sudo GOCKER_BIN="$PWD/gocker" ./test/smoke.sh

  integration-linux:
    name: Integration (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install containerd + nerdctl + CNI
        env:
          # Anonymous api.github.com calls share a rate limit across all
          # tenants on a runner's IP — unauthenticated lookups intermittently
          # return an error body that jq turns into "null", and tar then
          # chokes on the HTML 404 that follows ("not in gzip format").
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # containerd
          sudo apt-get update && sudo apt-get install -y containerd
          sudo systemctl start containerd

          # nerdctl
          NERDCTL_VERSION=$(gh api repos/containerd/nerdctl/releases/latest --jq .tag_name)
          curl -sSL --fail "https://github.com/containerd/nerdctl/releases/download/${NERDCTL_VERSION}/nerdctl-${NERDCTL_VERSION#v}-linux-amd64.tar.gz" | sudo tar -xzf - -C /usr/local/bin

          # CNI plugins
          CNI_VERSION=$(gh api repos/containernetworking/plugins/releases/latest --jq .tag_name)
          sudo mkdir -p /opt/cni/bin
          curl -sSL --fail "https://github.com/containernetworking/plugins/releases/download/${CNI_VERSION}/cni-plugins-linux-amd64-${CNI_VERSION}.tgz" | sudo tar -xzf - -C /opt/cni/bin
      - name: Pull test images
        run: sudo nerdctl pull alpine:latest
      - name: Run integration tests
        run: sudo go test -tags integration -timeout 5m -v ./...
