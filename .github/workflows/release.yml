name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Gate release on tests so a broken tag never ships. Integration tests
  # are skipped because they need a real container runtime; unit + lint +
  # cross-build is enough to catch signature/API drift.
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Unit tests
        run: go test ./...
      - name: Cross-compile Linux
        run: |
          GOOS=linux GOARCH=amd64 go build ./...
          GOOS=linux GOARCH=arm64 go build ./...
      - uses: golangci/golangci-lint-action@v7

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Generate CHANGELOG.md from tags
        run: |
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          tags=($(git tag --sort=-v:refname))
          for i in "${!tags[@]}"; do
            tag="${tags[$i]}"
            echo "## ${tag}" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            # Next older tag, or root commit if this is the oldest tag
            next_idx=$((i + 1))
            if [ "$next_idx" -lt "${#tags[@]}" ]; then
              prev="${tags[$next_idx]}"
            else
              prev=$(git rev-list --max-parents=0 HEAD | head -1)
            fi
            git log --pretty=format:"- %s" "${prev}..${tag}" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          done

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save generated changelog, checkout main, then restore it
          cp CHANGELOG.md /tmp/CHANGELOG.md
          git checkout main
          cp /tmp/CHANGELOG.md CHANGELOG.md
          git add CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}"
          git push origin main
