services:
  web:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./html:/usr/share/nginx/html
    environment:
      NGINX_HOST: localhost
    depends_on:
      - api
    networks:
      - frontend

  api:
    image: python:3-slim
    command: python -m http.server 5000
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
      - DEBUG=true
    volumes:
      - app-data:/app/data
    networks:
      - frontend
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend

volumes:
  app-data:
  redis-data:

networks:
  frontend:
  backend:
