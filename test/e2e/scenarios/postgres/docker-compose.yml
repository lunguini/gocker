services:
  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_USER: e2e
      POSTGRES_PASSWORD: e2e
      POSTGRES_DB: e2e
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U e2e -d e2e"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  pgdata:
